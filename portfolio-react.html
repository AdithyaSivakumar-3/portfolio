<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adithya Sivakumar — Mechanical Engineer (React)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --accent:#22d3ee;--accent-2:#38bdf8;--accent-3:#818cf8;--radius:14px;--max:1140px;
    --fd:'Space Grotesk',sans-serif;--fb:'Sora',-apple-system,sans-serif;--fm:'JetBrains Mono',monospace;
  }
  [data-theme="dark"]{
    --bg:#080b11;--bg-alt:#0c111a;--card:#0e141f;--text:#e6edf3;--muted:#97a4b4;--mutel:#5e6b7c;
    --border:#1b2533;--border-l:#141c28;--soft:rgba(34,211,238,.12);--line:rgba(34,211,238,.35);--ring:#22d3ee;
    --glow:rgba(34,211,238,.25);--grid:rgba(120,140,165,.06);--shadow:0 8px 30px rgba(0,0,0,.45);
    --shadow-lg:0 18px 50px rgba(0,0,0,.6);--veil:radial-gradient(circle at 70% 30%,rgba(34,211,238,.10),transparent 55%);
  }
  [data-theme="light"]{
    --bg:#fff;--bg-alt:#f5f8fc;--card:#fff;--text:#0f1b2d;--muted:#4a5b70;--mutel:#8595a8;
    --border:#e0e7f0;--border-l:#eef2f7;--accent:#0891b2;--accent-2:#0284c7;--accent-3:#4f46e5;
    --soft:rgba(8,145,178,.08);--line:rgba(8,145,178,.3);--ring:#0b5c63;--glow:rgba(8,145,178,.18);--grid:rgba(15,27,45,.04);
    --shadow:0 4px 14px rgba(15,27,45,.07);--shadow-lg:0 16px 44px rgba(15,27,45,.12);--veil:radial-gradient(circle at 72% 28%,rgba(8,145,178,.08),transparent 55%);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;scroll-padding-top:90px}
  body{font-family:var(--fb);color:var(--text);background:var(--bg);line-height:1.7;font-size:15px;overflow-x:hidden;transition:background .4s,color .4s}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:46px 46px;-webkit-mask-image:radial-gradient(circle at 50% 0%,#000,transparent 75%);mask-image:radial-gradient(circle at 50% 0%,#000,transparent 75%)}
  #root{position:relative;z-index:1}
  ::selection{background:var(--soft)}
  a{color:inherit;text-decoration:none}
  .mono{font-family:var(--fm)}.disp{font-family:var(--fd)}
  .progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent-3));z-index:200;box-shadow:0 0 10px var(--glow)}
  nav{position:fixed;top:0;left:0;right:0;z-index:150;backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);background:color-mix(in srgb,var(--bg) 72%,transparent);border-bottom:1px solid transparent;transition:border-color .3s}
  nav.scrolled{border-bottom-color:var(--border)}
  .nav-inner{max-width:var(--max);margin:0 auto;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:68px}
  .nav-logo{font-family:var(--fd);font-weight:700;font-size:1.05rem;display:flex;align-items:center;gap:.5rem}
  .blink{width:8px;height:8px;border-radius:2px;background:var(--accent);box-shadow:0 0 8px var(--glow);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes breathe{0%,100%{opacity:.35}50%{opacity:.7}}
  .nav-right{display:flex;align-items:center;gap:1.75rem}
  .nav-links{display:flex;gap:1.75rem;list-style:none}
  .nav-links a{color:var(--muted);font-size:.92rem;font-weight:500;font-family:var(--fd);position:relative;padding:4px 0;transition:color .2s}
  .nav-links a:hover,.nav-links a.active{color:var(--accent)}
  .nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1.5px;background:var(--accent);box-shadow:0 0 6px var(--glow);transition:width .25s}
  .nav-links a:hover::after,.nav-links a.active::after{width:100%}
  .tt{background:var(--card);border:1px solid var(--border);width:38px;height:38px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .25s}
  .tt:hover{color:var(--accent);border-color:var(--line);box-shadow:0 0 14px var(--glow)}
  .tt svg{width:18px;height:18px}
  .ham{display:none;background:none;border:none;cursor:pointer;padding:6px}
  .ham span{display:block;width:22px;height:2px;background:var(--text);margin:5px 0;transition:.3s;border-radius:2px}
  .hero{min-height:100vh;display:flex;align-items:center;padding:120px 2rem 60px;max-width:var(--max);margin:0 auto;position:relative}
  .hero::after{content:'';position:absolute;inset:0;z-index:-1;background:var(--veil)}
  .theme-label{font-family:var(--fm);font-size:.6rem;letter-spacing:.02em;color:var(--mutel);white-space:nowrap;user-select:none}
  .scroll-cue{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:9px;font-family:var(--fm);font-size:.62rem;letter-spacing:.28em;color:var(--mutel);z-index:2;pointer-events:none}
  .scroll-cue .scroll-line{width:1.5px;height:36px;border-radius:2px;overflow:hidden;background:var(--border)}
  .scroll-cue .scroll-line::after{content:'';display:block;width:100%;height:40%;background:var(--accent);border-radius:2px;animation:scrolldown 1.8s cubic-bezier(.6,0,.4,1) infinite}
  @keyframes scrolldown{0%{transform:translateY(-100%)}60%,100%{transform:translateY(250%)}}
  .hero-grid{display:flex;flex-direction:row-reverse;align-items:center;gap:3.5rem;width:100%}
  .pw{position:relative;flex-shrink:0;width:380px;height:380px;display:flex;align-items:center;justify-content:center}
  .photo{width:268px;height:268px;border-radius:50%;object-fit:cover;object-position:center top;display:block;position:relative;z-index:2}
  .pw::before{content:'';position:absolute;width:380px;height:380px;border-radius:50%;border:2px solid var(--ring);opacity:.18;z-index:0}
  .ringthick{position:absolute;width:346px;height:346px;border-radius:50%;border:11px solid var(--ring);opacity:.45;z-index:1;animation:breathe 5s ease-in-out infinite}
  .pw::after{content:'';position:absolute;width:300px;height:300px;border-radius:50%;border:2px solid var(--ring);opacity:.4;z-index:1}
  .pframe{position:absolute;width:284px;height:284px;border:1px solid var(--ring);border-radius:50%;z-index:1;opacity:.35}
  .pbadge{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);z-index:3;background:var(--card);border:1px solid var(--border);padding:.3rem .8rem;border-radius:20px;font-family:var(--fm);font-size:.68rem;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:.4rem;box-shadow:var(--shadow)}
  .gdot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px #22c55e;animation:pulse 2s infinite}
  .eyebrow{font-family:var(--fm);font-size:.8rem;color:var(--accent);letter-spacing:.05em;margin-bottom:1rem;display:flex;align-items:center;gap:.6rem}
  .eyebrow::before{content:'';width:28px;height:1px;background:var(--line)}
  h1.name{font-family:var(--fd);font-size:3.4rem;font-weight:700;line-height:1.05;letter-spacing:-.03em}
  .grad{background:linear-gradient(115deg,var(--accent),var(--accent-2) 45%,var(--accent-3));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .roles{font-family:var(--fm);font-size:1rem;color:var(--muted);margin-top:1rem;min-height:1.6em}
  .cursor{color:var(--accent);animation:pulse 1s steps(2) infinite;font-weight:600}
  .summary{color:var(--muted);margin-top:1.25rem;max-width:580px;font-size:.97rem;font-weight:300}
  .cta-row{margin-top:2rem;display:flex;gap:.9rem;flex-wrap:wrap;align-items:center}
  .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.8rem 1.6rem;border-radius:10px;font-weight:500;font-size:.88rem;font-family:var(--fm);cursor:pointer;transition:all .25s;border:1px solid transparent}
  .btn-p{background:var(--accent);color:#04121a}
  .btn-p:hover{box-shadow:0 8px 26px var(--glow);transform:translateY(-2px)}
  .btn-g{background:transparent;color:var(--text);border-color:var(--border)}
  .btn-g:hover{border-color:var(--line);color:var(--accent);box-shadow:0 0 18px var(--glow)}
  .contacts{margin-top:2rem;display:flex;gap:1.25rem;flex-wrap:wrap;align-items:center;font-family:var(--fm);font-size:.78rem;color:var(--mutel)}
  .contacts a{color:var(--muted)}.contacts a:hover{color:var(--accent)}.sep{color:var(--border)}
  .cresult{margin:.9rem 1.35rem 0;padding:.5rem .75rem;background:var(--accent-soft);border:1px solid var(--accent-line);border-left:3px solid var(--accent);border-radius:8px;font-family:var(--fm);font-size:.72rem;color:var(--accent);display:flex;align-items:center;gap:.45rem;line-height:1.45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cresult::before{content:'▸';font-weight:700;flex-shrink:0}
  section{padding:5.5rem 2rem;max-width:var(--max);margin:0 auto}
  .alt{background:var(--bg-alt);border-top:1px solid var(--border-l);border-bottom:1px solid var(--border-l)}
  .alt .inner{max-width:var(--max);margin:0 auto;padding:5.5rem 2rem}
  .head{margin-bottom:3rem}
  .snum{font-family:var(--fm);font-size:.78rem;color:var(--accent);letter-spacing:.08em;display:flex;align-items:center;gap:.6rem;margin-bottom:.75rem}
  .snum::after{content:'';flex:1;height:1px;background:var(--border);max-width:240px}
  .stitle{font-family:var(--fd);font-size:2.1rem;font-weight:700;letter-spacing:-.02em}
  .ssub{color:var(--muted);font-size:.95rem;margin-top:.5rem;font-weight:300}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:1.5rem}
  .pcard{position:relative;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:transform .3s,border-color .3s,box-shadow .3s}
  .pcard::before{content:'';position:absolute;inset:0;border-radius:var(--radius);padding:1px;background:linear-gradient(135deg,var(--accent),transparent 40%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .3s;pointer-events:none}
  .pcard:hover{transform:translateY(-6px);border-color:transparent;box-shadow:var(--shadow-lg)}
  .pcard:hover::before{opacity:1}
  .pimg-w{overflow:hidden;height:185px;background:var(--bg-alt);border-bottom:1px solid var(--border-l);position:relative}
  .pimg{width:100%;height:100%;object-fit:cover;transition:transform .5s}
  .pcard:hover .pimg{transform:scale(1.07)}
  .pph{width:100%;height:185px;display:flex;align-items:center;justify-content:center;font-size:3rem;color:var(--accent);border-bottom:1px solid var(--border-l);background:radial-gradient(circle at 50% 50%,var(--soft),transparent 70%),repeating-linear-gradient(45deg,var(--border-l) 0 1px,transparent 1px 14px)}
  .pbody{padding:1.25rem 1.35rem .5rem;flex:1}
  .corg{font-family:var(--fm);font-size:.74rem;color:var(--accent);margin-bottom:.5rem}
  .pbody h3{font-family:var(--fd);font-size:1.1rem;font-weight:600;margin-bottom:.5rem;line-height:1.25}
  .pbody p{font-size:.85rem;color:var(--muted);line-height:1.55;font-weight:300}
  .ptags{padding:.75rem 1.35rem 1.35rem;display:flex;flex-wrap:wrap;gap:.4rem}
  .tag{font-family:var(--fm);font-size:.68rem;padding:.25rem .65rem;background:var(--soft);color:var(--accent);border-radius:6px;border:1px solid var(--line)}
  .filters{display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:2rem}
  .fchip{font-family:var(--fm);font-size:.76rem;padding:.45rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;transition:all .2s}
  .fchip:hover{color:var(--accent);border-color:var(--line)}
  .fchip.active{background:var(--accent);color:#04121a;border-color:var(--accent);box-shadow:0 0 16px var(--glow)}
  .pcard.hide{display:none}
  .about-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:3rem;align-items:start}
  .about p{margin-bottom:1.1rem;color:var(--muted);font-weight:300}.about strong{color:var(--text);font-weight:500}
  .comp{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem}
  .comp h3{font-family:var(--fm);font-size:.78rem;color:var(--accent);letter-spacing:.05em;margin-bottom:1.1rem;text-transform:uppercase}
  .cItem{display:flex;align-items:center;gap:.7rem;font-size:.88rem;padding:.4rem 0;font-weight:300}
  .cItem .d{width:6px;height:6px;background:var(--accent);border-radius:50%;flex-shrink:0;box-shadow:0 0 6px var(--glow)}
  .edu-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
  .edu{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;transition:border-color .3s,box-shadow .3s}
  .edu:hover{border-color:var(--line);box-shadow:var(--shadow)}
  .edu-h{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:.5rem}
  .edu-h h3{font-family:var(--fd);font-size:1.15rem;font-weight:600}
  .edu-date{font-family:var(--fm);font-size:.74rem;color:var(--mutel)}
  .edu-deg{font-size:.92rem;color:var(--accent);font-weight:500;margin-top:.4rem}
  .edu-loc{font-family:var(--fm);font-size:.76rem;color:var(--muted);margin-top:.25rem}
  .edu-det{font-size:.85rem;color:var(--muted);margin-top:.85rem;font-weight:300}.edu-det strong{color:var(--text);font-weight:500}
  .timeline{position:relative}
  .timeline::before{content:'';position:absolute;left:188px;top:10px;bottom:10px;width:1.5px;background:linear-gradient(var(--line),var(--border) 30%)}
  .ti{position:relative;display:grid;grid-template-columns:168px 1fr;column-gap:2.25rem;padding-bottom:3.5rem}.ti:last-child{padding-bottom:0}
  .tdate-col{justify-self:end;align-self:start;margin-top:.3rem;white-space:nowrap;font-family:var(--fm);font-size:.68rem;font-weight:700;letter-spacing:.02em;color:#fff;text-transform:uppercase;text-align:center;line-height:1.35;background:linear-gradient(135deg,var(--accent),var(--accent-3));padding:.42rem .7rem;border-radius:20px;box-shadow:0 3px 12px var(--glow)}
  .tdot{position:absolute;left:182px;top:8px;width:13px;height:13px;border-radius:50%;background:var(--bg);border:2px solid var(--accent);box-shadow:0 0 10px var(--glow)}
  .tl-labels{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.6rem}
  .tl-label{display:inline-block;font-family:var(--fm);font-size:.66rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);border:1px solid var(--line);background:var(--soft);padding:.28rem .7rem;border-radius:20px}
  .tdot::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--accent)}
  .tcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;transition:border-color .3s,box-shadow .3s}
  .tcard:hover{border-color:var(--line);box-shadow:var(--shadow)}
  .th{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:.5rem}
  .th h3{font-family:var(--fd);font-size:1.15rem;font-weight:600}
  .tdate{font-family:var(--fm);font-size:.72rem;color:var(--accent);background:var(--soft);border:1px solid var(--line);padding:.2rem .6rem;border-radius:6px;white-space:nowrap}
  .torg-row{display:flex;gap:.6rem;align-items:baseline;flex-wrap:wrap;margin-top:.35rem}
  .torg{font-size:.92rem;color:var(--accent-2);font-weight:500}
  .tloc{font-family:var(--fm);font-size:.74rem;color:var(--muted)}
  .tsub{font-family:var(--fm);font-size:.72rem;color:var(--mutel);margin-top:.15rem}
  .esub{margin-top:1.25rem}
  .esub h4{font-family:var(--fm);font-size:.72rem;font-weight:500;color:var(--accent);margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.06em;display:inline-flex;align-items:center;gap:.5rem}
  .esub h4::before{content:'▹';color:var(--accent)}
  .elist{list-style:none;padding:0}
  .elist li{position:relative;padding-left:1.1rem;margin-bottom:.5rem;font-size:.87rem;color:var(--muted);font-weight:300}
  .elist li::before{content:'';position:absolute;left:0;top:.65em;width:5px;height:5px;background:var(--accent);border-radius:1px;opacity:.7}
  .elist li strong{color:var(--text);font-weight:500}
  .outcome{background:var(--soft);border:1px solid var(--line);border-left:3px solid var(--accent);padding:1rem 1.25rem;border-radius:0 10px 10px 0;margin:1.25rem 0 0}
  .ot{font-family:var(--fm);font-weight:600;margin-bottom:.5rem;color:var(--accent);font-size:.74rem;text-transform:uppercase;letter-spacing:.06em}
  .outcome ul{list-style:none;padding:0;margin:0}
  .outcome li{position:relative;padding-left:1.2rem;margin-bottom:.4rem;line-height:1.55;font-size:.87rem;font-weight:300}
  .outcome li::before{content:'+';position:absolute;left:0;color:var(--accent);font-family:var(--fm);font-weight:600}
  .ig{display:grid;gap:1rem;margin:1.25rem 0 0}.ig2{grid-template-columns:1fr 1fr}.ig3{grid-template-columns:1fr 1fr 1fr}
  .ig figure,.iw{margin:0;background:var(--bg-alt);border-radius:10px;overflow:hidden;border:1px solid var(--border-l)}
  .ig img{width:100%;aspect-ratio:16/10;object-fit:contain;display:block;padding:10px;box-sizing:border-box}
  .ig3 img{aspect-ratio:4/3;padding:6px}
  .iw img{width:100%;aspect-ratio:21/9;object-fit:contain;display:block;padding:10px;box-sizing:border-box}
  .ig figcaption,.iw figcaption{padding:.55rem .8rem;font-family:var(--fm);font-size:.7rem;color:var(--muted);text-align:center}
  .zoomable{cursor:zoom-in}
  .lightbox{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(3,6,12,.92);backdrop-filter:blur(4px);padding:4vh 4vw;cursor:zoom-out}
  .lightbox img{max-width:94vw;max-height:82vh;object-fit:contain;border-radius:8px;box-shadow:0 24px 70px rgba(0,0,0,.7);background:#fff}
  .lightbox figcaption{color:#e6edf3;font-family:var(--fm);font-size:.85rem;margin-top:1.1rem;text-align:center;max-width:90vw}
  .lightbox-close{position:fixed;top:18px;right:26px;width:42px;height:42px;border-radius:50%;font-size:1.5rem;line-height:1;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25);cursor:pointer;z-index:301}
  .lightbox-hint{color:rgba(230,237,243,.55);font-family:var(--fm);font-size:.68rem;margin-top:.5rem}
  .iw{margin:1rem 0 0}
  .pd{padding:2.5rem 0;border-bottom:1px solid var(--border-l)}.pd:last-child{border-bottom:none}
  .pd>h3{font-family:var(--fd);font-size:1.5rem;font-weight:700;margin-bottom:.3rem}
  .pdorg{color:var(--accent);font-weight:500;font-size:.92rem}
  .pddate{font-family:var(--fm);color:var(--mutel);font-size:.76rem;margin-top:.3rem}
  .pddesc{color:var(--muted);font-size:.9rem;margin-top:.85rem;font-weight:300}
  .pdrole{font-size:.9rem;color:var(--muted);margin-top:.85rem;font-weight:300}.pdrole strong{color:var(--text);font-weight:500}
  .sp{margin-top:1.75rem;padding:1.6rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
  .sp h4{font-family:var(--fd);font-size:1rem;font-weight:600;margin-bottom:.6rem;display:inline-flex;align-items:center;gap:.55rem}
  .sp h4::before{content:'';width:18px;height:18px;border-radius:5px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent-3));box-shadow:0 0 10px var(--glow)}
  .spo{font-size:.87rem;color:var(--muted);margin-bottom:.7rem;font-weight:300}.spo strong{color:var(--text);font-weight:500}
  .skills{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem}
  .scat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;transition:border-color .3s,box-shadow .3s}

function useReveal(){
  useEffect(()=>{
    const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.12});
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  },[]);
}

    </div>
  ));
}

function Counter({prefix,target,unit}){
  const ref=useRef(null);const[n,setN]=useState(0);
  useEffect(()=>{
    const el=ref.current;
    const io=new IntersectionObserver(es=>es.forEach(e=>{
      if(e.isIntersecting){let v=0;const t=+target;const step=Math.max(1,Math.round(t/28));
        const tick=()=>{v=Math.min(t,v+step);setN(v);if(v<t)requestAnimationFrame(tick);};tick();io.unobserve(el);}
    }),{threshold:.5});
    io.observe(el);return ()=>io.disconnect();
  },[target]);
  return <div className="num" ref={ref}>{prefix}{n}<span className="unit">{unit}</span></div>;
}
